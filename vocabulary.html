<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polish basics — vocabulary for travellers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #f0f4f8;
      --card:     #ffffff;
      --surface:  #f5f7fa;
      --warn-bg:  #fffbeb;
      --t1:       #111827;
      --t2:       #6b7280;
      --t3:       #9ca3af;
      --t-info:   #1d6fbc;
      --t-warn:   #92400e;
      --t-danger: #c0392b;
      --b1:       #e5e7eb;
      --b2:       #d1d5db;
      --r1: 8px;
      --r2: 12px;
      --serif: 'Lora', Georgia, serif;
      --sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #111827;
        --card:     #1f2937;
        --surface:  #111827;
        --warn-bg:  #1c1400;
        --t1:       #f9fafb;
        --t2:       #9ca3af;
        --t3:       #6b7280;
        --t-info:   #60a5fa;
        --t-warn:   #fcd34d;
        --t-danger: #f87171;
        --b1:       #374151;
        --b2:       #4b5563;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--t1);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.5;
    }

    .wrap { max-width: 680px; margin: 0 auto; }

    h1 {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 3px;
    }

    .sub  { font-size: 13px; color: var(--t3); margin-bottom: 1.75rem; }
    .note { font-size: 12px; color: var(--t3); margin-bottom: 1rem; }

    .nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }

    button {
      font-family: var(--sans);
      font-size: 13px;
      padding: 5px 13px;
      background: var(--card);
      border: 0.5px solid var(--b2);
      border-radius: 6px;
      color: var(--t2);
      cursor: pointer;
      transition: background .15s, color .15s;
      line-height: 1.5;
    }
    button:hover:not(:disabled) { background: var(--surface); color: var(--t1); }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.35; cursor: default; }
    button.on {
      background: #dbeafe;
      color: var(--t-info);
      border-color: transparent;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) { button.on { background: #1e3a5f; } }

    @keyframes pf {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: var(--card);
      border: 0.5px solid var(--b1);
      border-radius: var(--r2);
      overflow: hidden;
      animation: pf .18s ease;
    }

    .ch {
      background: var(--surface);
      padding: 1rem 1.25rem;
      position: relative;
      overflow: hidden;
      border-bottom: 0.5px solid var(--b1);
    }
    .ch-big {
      position: absolute; right: 6px; top: -6px;
      font-family: var(--serif);
      font-size: 80px; font-weight: 500;
      color: var(--t1); opacity: .06;
      line-height: 1; pointer-events: none; user-select: none;
    }
    .ch-rule { font-size: 14px; font-weight: 500; max-width: 480px; line-height: 1.5; }
    .ch-tip  { font-size: 13px; color: var(--t2); margin-top: 5px; line-height: 1.4; max-width: 480px; }

    .cb { padding: 1.25rem; }

    .ex { background: var(--surface); border-radius: var(--r1); padding: 10px 12px; margin-bottom: 8px; }
    .ex:last-child { margin-bottom: 0; }

    .et { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .ew { font-family: var(--serif); font-size: 22px; font-weight: 500; color: var(--t1); }
    .em { font-size: 12px; color: var(--t2); font-style: italic; }

    .try { background: var(--warn-bg); border-radius: var(--r1); padding: 7px 10px; }
    .tl  { font-size: 11px; color: var(--t-warn); margin-bottom: 2px; }
    .tp  { font-family: var(--serif); font-size: 17px; }

    .ps { color: inherit; }
    .px { color: var(--t-danger); font-weight: 500; }
    .pd { color: var(--t3); margin: 0 3px; }

    .wnote { font-size: 11px; color: var(--t3); margin-top: 6px; font-style: italic; }

    .speak-btn {
      background: transparent;
      border: none;
      padding: 2px 4px;
      cursor: pointer;
      color: var(--t3);
      border-radius: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .speak-btn:hover:not(:disabled) { background: transparent; color: var(--t-info); }
    .speak-btn:active:not(:disabled) { transform: scale(0.95); }
    .speak-btn svg { display: block; }

    .pager { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 1rem; padding: .5rem; }
    .dots  { display: flex; gap: 5px; align-items: center; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--b2); cursor: pointer;
      border: none; padding: 0; flex-shrink: 0;
      transition: all .15s;
    }
    .dot.on { background: var(--t-info); width: 18px; border-radius: 3px; }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--t3);
      margin-top: 2.5rem;
    }
    footer a { color: var(--t-info); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .sr { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>
</head>
<body>
<div class="wrap">
  <h2 class="sr">Polish vocabulary for leisure travellers — interactive word cards</h2>
  <h1>Polish basics</h1>
  <p class="sub">Essential vocabulary for a week in Poland</p>
  <p class="note">CAPS = stressed syllable &nbsp;·&nbsp; syllables separated by &middot;</p>
  <nav class="nav" id="nav" aria-label="Vocabulary categories"></nav>
  <div id="card"></div>
  <div class="pager" id="pgr"></div>
  <footer>
    <p>Seven words at a time — keep it simple, keep it useful.</p>
    <p style="margin-top:6px;"><a href="index.html">← menu</a></p>
  </footer>
</div>

<script>
const C = [
  {
    nav: "Greetings",
    big: "cześć",
    rule: "Seven words that will carry you through most social encounters.",
    tip: "Poles genuinely appreciate any attempt to speak Polish — even one word earns goodwill.",
    words: [
      { polish: "cześć",       english: "hi / bye (informal)",   ph: "cheshch",             note: "Works for both hello and goodbye with friends and peers" },
      { polish: "dzień dobry", english: "good day (formal)",     ph: "dyen · DOH · brih",   note: "Use with shopkeepers, hotel staff, and strangers" },
      { polish: "do widzenia", english: "goodbye (formal)",      ph: "doh · vee · DZEH · nyah" },
      { polish: "proszę",      english: "please / here you go",  ph: "PROH · sheh",         note: "Also means 'you're welcome' — one word, many situations" },
      { polish: "dzięki",      english: "thanks (informal)",     ph: "JEHN · kee" },
      { polish: "tak",         english: "yes",                   ph: "tahk" },
      { polish: "nie",         english: "no",                    ph: "nyeh" },
    ]
  },
  {
    nav: "Numbers 1–7",
    big: "1",
    rule: "Seven numbers — enough for ordering, pricing, and telling taxis where to stop.",
    tip: "Polish numbers change form in different grammatical situations, but saying these plainly will always be understood.",
    words: [
      { polish: "jeden",  english: "one",   ph: "YEH · den" },
      { polish: "dwa",    english: "two",   ph: "dvah" },
      { polish: "trzy",   english: "three", ph: "tshih" },
      { polish: "cztery", english: "four",  ph: "CHTE · rih" },
      { polish: "pięć",   english: "five",  ph: "pyench" },
      { polish: "sześć",  english: "six",   ph: "sheshch",   note: "Sounds similar to cześć (hi) — same ending, different start" },
      { polish: "siedem", english: "seven", ph: "SHYE · dem" },
    ]
  },
  {
    nav: "Getting around",
    big: "gdzie",
    rule: "Seven words for navigating Polish cities.",
    tip: "Trams (tramwaj) run through most major Polish cities — Kraków, Wrocław, Warsaw — and are the easiest way to get around.",
    words: [
      { polish: "gdzie",    english: "where",          ph: "gdjeh" },
      { polish: "lewo",     english: "left",           ph: "LEH · voh" },
      { polish: "prawo",    english: "right",          ph: "PRAH · voh" },
      { polish: "prosto",   english: "straight ahead", ph: "PROH · stoh" },
      { polish: "tu",       english: "here",           ph: "too" },
      { polish: "taksówka", english: "taxi",           ph: "tahk · SOOF · kah" },
      { polish: "tramwaj",  english: "tram",           ph: "TRAHM · vay" },
    ]
  },
  {
    nav: "Food & drink",
    big: "kawa",
    rule: "Seven words for restaurants and cafés.",
    tip: "Polish tap water is safe to drink. In restaurants, 'woda' usually gets you bottled — say 'woda z kranu' if you want tap.",
    words: [
      { polish: "woda",     english: "water",       ph: "VOH · dah" },
      { polish: "piwo",     english: "beer",        ph: "PEE · voh" },
      { polish: "kawa",     english: "coffee",      ph: "KAH · vah" },
      { polish: "herbata",  english: "tea",         ph: "her · BAH · tah" },
      { polish: "chleb",    english: "bread",       ph: "khleb",           note: "The ch is the raspy sound in Scottish 'loch'" },
      { polish: "menu",     english: "menu",        ph: "MEH · noo",       note: "Same word — just say it with a Polish accent" },
      { polish: "rachunek", english: "bill / check", ph: "rah · KHOO · nek" },
    ]
  },
  {
    nav: "Shopping",
    big: "rynek",
    rule: "Seven words for markets and shops.",
    tip: "The rynek is the main market square at the heart of most Polish cities. Kraków's is one of the largest medieval market squares in Europe.",
    words: [
      { polish: "ile",        english: "how much",  ph: "EE · leh" },
      { polish: "sklep",      english: "shop",      ph: "sklep" },
      { polish: "rynek",      english: "market square", ph: "RIH · nek" },
      { polish: "tani",       english: "cheap",     ph: "TAH · nee" },
      { polish: "drogi",      english: "expensive", ph: "DROH · gee" },
      { polish: "otwarte",    english: "open",      ph: "oh · TVAHR · teh" },
      { polish: "zamknięte",  english: "closed",    ph: "zahm · KNYEH · teh" },
    ]
  },
  {
    nav: "At the hotel",
    big: "pokój",
    rule: "Seven words for your accommodation.",
    tip: "WiFi is pronounced 'VEE-fee' in Polish — say it that way and reception will understand you immediately.",
    words: [
      { polish: "pokój",     english: "room",      ph: "POH · kooy" },
      { polish: "klucz",     english: "key",       ph: "klooch" },
      { polish: "łazienka",  english: "bathroom",  ph: "wah · ZHEN · kah" },
      { polish: "śniadanie", english: "breakfast", ph: "shnyah · DAH · nyeh" },
      { polish: "ręcznik",   english: "towel",     ph: "RENCH · neek" },
      { polish: "WiFi",      english: "WiFi",      ph: "VEE · fee",         note: "Same word — Polish pronunciation only" },
      { polish: "zimno",     english: "cold",      ph: "ZEEM · noh",        note: "Useful if the room or shower is not warm enough" },
    ]
  },
  {
    nav: "Asking for help",
    big: "pomoc",
    rule: "Seven words for when things go wrong.",
    tip: "In a real emergency, shout 'POMOCY!' — the -y ending turns the noun into an urgent call.",
    words: [
      { polish: "pomoc",          english: "help",        ph: "POH · mots" },
      { polish: "policja",        english: "police",      ph: "poh · LEETS · yah" },
      { polish: "lekarz",         english: "doctor",      ph: "LEH · kahsh" },
      { polish: "szpital",        english: "hospital",    ph: "SHPEE · tahl" },
      { polish: "ból",            english: "pain",        ph: "bool" },
      { polish: "gdzie jestem?",  english: "where am I?", ph: "gdjeh · YES · tem" },
      { polish: "telefon",        english: "phone",       ph: "teh · LEH · fon",  note: "Same word — Polish pronunciation only" },
    ]
  },
];

const SPEAKER = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;

function speak(word) {
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'pl-PL';
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

let cur = 0;

function ph(s) {
  if (!s.includes('·')) return `<span class="ps">${s}</span>`;
  const p = s.split('·').map(x => x.trim());
  return p.map((t, i) => {
    const stress = t === t.toUpperCase() && /[A-Z]/.test(t);
    const sep = i < p.length - 1 ? '<span class="pd">&middot;</span>' : '';
    return `<span class="${stress ? 'px' : 'ps'}">${t}</span>${sep}`;
  }).join('');
}

function vocab(d) {
  return d.words.map(w => {
    const speech = w.polish.replace(/[?!]/g, '').trim();
    return `
      <div class="ex">
        <div class="et">
          <span style="display:flex;align-items:center;gap:8px;">
            <span class="ew">${w.polish}</span>
            <button class="speak-btn" onclick="speak('${speech}')" aria-label="Pronounce ${speech}">${SPEAKER}</button>
          </span>
          <span class="em">${w.english}</span>
        </div>
        <div class="try">
          <div class="tl">Try saying it like this</div>
          <div class="tp">${ph(w.ph)}</div>
        </div>
        ${w.note ? `<div class="wnote">${w.note}</div>` : ''}
      </div>`;
  }).join('');
}

function render() {
  const d = C[cur];
  document.getElementById('nav').innerHTML = C.map((c, i) =>
    `<button class="${i === cur ? 'on' : ''}" onclick="go(${i})">${c.nav}</button>`
  ).join('');
  document.getElementById('card').innerHTML = `
    <div class="card">
      <div class="ch">
        <div class="ch-big" aria-hidden="true">${d.big}</div>
        <div class="ch-rule">${d.rule}</div>
        <div class="ch-tip">${d.tip}</div>
      </div>
      <div class="cb">${vocab(d)}</div>
    </div>`;
  document.getElementById('pgr').innerHTML = `
    <button onclick="go(${Math.max(0, cur - 1)})"${cur === 0 ? ' disabled' : ''}>← previous</button>
    <div class="dots">${C.map((_, i) =>
      `<button class="dot${i === cur ? ' on' : ''}" onclick="go(${i})" aria-label="Card ${i + 1} of ${C.length}"></button>`
    ).join('')}</div>
    <button onclick="go(${Math.min(C.length - 1, cur + 1)})"${cur === C.length - 1 ? ' disabled' : ''}>next →</button>`;
}

function go(n) { cur = n; render(); }
render();
</script>
</body>
</html>
